name: CI

on:
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Check (format, lint, typecheck, test)
        run: pnpm run check

      - name: Dead code check
        run: pnpm run knip

      - name: Coverage enforcement
        run: pnpm run test:coverage

      - name: Integration tests
        run: pnpm install --frozen-lockfile --dir container/agent-runner && pnpm run test:integration
