name: Publish Images

on:
  push:
    branches: [main]
    paths-ignore:
      - "examples/**"

permissions:
  contents: read
  packages: write

jobs:
  publish-host:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/nanoclaw:latest
            ghcr.io/${{ github.repository_owner }}/nanoclaw:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: ./container
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/nanoclaw-agent:latest
            ghcr.io/${{ github.repository_owner }}/nanoclaw-agent:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
